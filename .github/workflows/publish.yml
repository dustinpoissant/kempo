name: Publish to npmjs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - run: npm ci

      - name: Build project and documentation
        run: |
          npm run build

      - name: Set version type
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ inputs.version-type }}" >> $GITHUB_OUTPUT
          else
            # Auto-patch on every push to main
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump ${{ steps.version.outputs.type }} version
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git pull origin $CURRENT_BRANCH || true
          npm version ${{ steps.version.outputs.type }} --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "ci: bump ${{ steps.version.outputs.type }} version [skip ci]" || true
          git push origin $CURRENT_BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .npmrc for OIDC
        run: |
          cat << EOF > ~/.npmrc
          //registry.npmjs.org/:_authToken=\${NPM_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF

      - run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
