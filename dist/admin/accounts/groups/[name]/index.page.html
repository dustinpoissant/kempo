-->
<page title="Group - Admin">
<content>
<script type="module" src="/kempo-ui/components/Icon.js"></script>
<script type="module" src="/kempo-ui/components/Table.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/FirstPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PrevPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/NextPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/LastPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PageSelect.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PageSize.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/DeleteRecord.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/DeleteSelected.js"></script>
<script type="module" src="/admin/components/TableRowLink.js"></script>

		<div class="mb">
			<a href="/admin/accounts/groups" class="no-link">
				<button class="mbh"><k-icon name="arrow" direction="left"></k-icon> Groups</button>
			</a>
			<h1 class="mb0" id="pageTitle">Group</h1>
		</div>

		<div id="loading">Loading group...</div>
		<div id="notFound" style="display: none;">
			<p>Group not found.</p>
			<a href="/admin/accounts/groups">Back to Groups</a>
		</div>
		<div id="content" style="display: none;">

			<!-- Group Information -->
			<div class="card">
				<h2>Information</h2>
				<k-table id="infoTable"></k-table>
			</div>

			<!-- Members -->
			<div class="card">
				<h2>Members</h2>
				<k-table id="membersTable" enable-pages page-size="10" page-size-options="[10,25,50]" placeholder="This group has no members.">
					<admin-table-row-link slot="before" url-pattern="/admin/accounts/users/{id}" field-name="id"></admin-table-row-link>
					<div slot="top" id="membersTableTop" class="d-f full" style="display:none; align-items: center;">
						<div><k-tc-delete-selected></k-tc-delete-selected></div>
						<div class="flex"></div>
						<div><button id="addMemberBtn" class="p-sm">Add Member</button></div>
					</div>
					<div class="d-f full" style="align-items: center;">
						<div>
							<k-tc-first-page></k-tc-first-page>
							<k-tc-prev-page></k-tc-prev-page>
							<k-tc-next-page></k-tc-next-page>
							<k-tc-last-page></k-tc-last-page>
						</div>
						<div class="flex"></div>
						<div><k-tc-page-select></k-tc-page-select></div>
						<div class="flex"></div>
						<div><k-tc-page-size></k-tc-page-size></div>
					</div>
				</k-table>
			</div>

			<!-- Permissions -->
			<div class="card">
				<h2>Permissions</h2>
				<p id="adminPermsMsg" style="display:none">Members of this group automatically have all permissions.</p>
				<k-table id="permissionsTable" enable-pages page-size="10" page-size-options="[10,25,50]" placeholder="No permissions assigned to this group.">
					<div class="d-f full" style="align-items: center;">
						<div>
							<k-tc-first-page></k-tc-first-page>
							<k-tc-prev-page></k-tc-prev-page>
							<k-tc-next-page></k-tc-next-page>
							<k-tc-last-page></k-tc-last-page>
						</div>
						<div class="flex"></div>
						<div><k-tc-page-select></k-tc-page-select></div>
						<div class="flex"></div>
						<div><k-tc-page-size></k-tc-page-size></div>
					</div>
				</k-table>
			</div>

		</div>

		<script type="module">
			import {
				getGroup, updateGroup, deleteGroups, getGroupMembers,
				addMemberToGroup, removeMemberFromGroup, getGroupPermissions,
				getUsers, getAllCurrentUserPermissions
			} from '/kempo/sdk.js';
			import { html } from '/kempo-ui/lit-all.min.js';
			import Toast from '/kempo-ui/components/Toast.js';
			import Dialog from '/kempo-ui/components/Dialog.js';

			const groupName = decodeURIComponent(
				window.location.pathname.split('/admin/accounts/groups/')[1]?.replace(/\/$/, '') || ''
			);

			if(!groupName){
				document.getElementById('loading').style.display = 'none';
				document.getElementById('notFound').style.display = '';
			}

			/*
				Permission checks
			*/

			const [, permResult] = await getAllCurrentUserPermissions();
			const myPerms = new Set(permResult?.permissions ?? []);
			const canEdit = myPerms.has('system:group:update');
			const canDelete = myPerms.has('system:group:delete');
			const canReadPerms = myPerms.has('system:permissions:read');

			/*
				Load group
			*/

			const [groupError, groupData] = await getGroup(groupName);

			document.getElementById('loading').style.display = 'none';

			if(groupError){
				document.getElementById('notFound').style.display = '';
			} else {
				document.getElementById('content').style.display = '';
				const displayName = groupName.includes(':') ? groupName.split(':').slice(1).join(':') : groupName;
				document.getElementById('pageTitle').textContent = `Group: ${displayName}`;
				document.title = `${displayName} - Admin`;

				const owner = groupName.includes(':') ? groupName.split(':')[0] : '';
				const isAdmin = owner === 'admin' || !owner;

				await customElements.whenDefined('k-table');

				/*
					Group Information
				*/

				const $infoTable = document.getElementById('infoTable');

				if(canEdit){
					$infoTable.setAttribute('request-edit', '');
				}

				$infoTable.setData({
					records: [groupData],
					fields: [
						{ name: 'owner', label: 'Owner', editable: false, calculator: () => owner || '(none)' },
						{ name: 'name', label: 'Name', editable: false, calculator: () => displayName },
						{ name: 'description', label: 'Description', editable: canEdit },
						{
							name: 'createdAt',
							label: 'Created',
							editable: false,
							formatter: v => new Date(v).toLocaleString()
						}
					]
				});

				$infoTable.addEventListener('requestSave', async ({ detail: { record, newData, approve, reject } }) => {
					const [error] = await updateGroup({ name: groupName, ...newData });
					if(error){
						reject();
						Toast.error(error.msg || 'Failed to update group');
						return;
					}
					approve();
					Toast.success('Group updated');
				});

				/*
					Members
				*/

				const $membersTable = document.getElementById('membersTable');

				if(canEdit){
					$membersTable.setAttribute('request-delete', '');
					$membersTable.setAttribute('enable-selection', '');
					document.getElementById('membersTableTop').style.display = '';

					const del = document.createElement('k-tc-delete-record');
					del.setAttribute('slot', 'after');
					$membersTable.appendChild(del);
				}

				$membersTable.addEventListener('requestDelete', ({ detail: { records, approve, reject } }) => {
					const count = records.length;
					const msg = count === 1
						? `<div class="p"><p>Remove "${records[0].name}" from this group?</p></div>`
						: `<div class="p"><p>Remove ${count} members from this group?</p></div>`;
					Dialog.confirm(msg, async (confirmed) => {
						if(!confirmed){ reject(); return; }
						const errors = [];
						for(const record of records){
							const [error] = await removeMemberFromGroup(groupName, record.id);
							if(error) errors.push(error.msg);
						}
						if(errors.length){
							reject();
							Toast.error(errors[0] || 'Failed to remove member');
							return;
						}
						approve();
						Toast.success(count === 1 ? 'Member removed' : `${count} members removed`);
						loadMembers();
					});
				});

				const loadMembers = async () => {
					const [error, data] = await getGroupMembers(groupName);
					if(error){
						Toast.error(error.msg || 'Failed to load members');
						return;
					}
					$membersTable.setData({
						records: data.members,
						fields: [
							{ name: 'name', label: 'Name' },
							{ name: 'email', label: 'Email' },
							{
								name: 'createdAt',
								label: 'Joined',
								formatter: v => new Date(v).toLocaleString()
							}
						]
					});
					$membersTable.setupFetchRecords(data.total, async (start, count) => {
						const [err, d] = await getGroupMembers(groupName, { limit: count, offset: start });
						if(err) return [];
						return d.members;
					});
				};

				document.getElementById('addMemberBtn').addEventListener('click', async () => {
					const [[usersError, usersData], [membersError, membersData]] = await Promise.all([
						getUsers({ limit: 1000 }),
						getGroupMembers(groupName)
					]);
					if(usersError){ Toast.error(usersError.msg || 'Failed to load users'); return; }
					if(membersError){ Toast.error(membersError.msg || 'Failed to load members'); return; }

					const memberIds = new Set(membersData.members.map(m => m.id));
					const available = usersData.users.filter(u => !memberIds.has(u.id));

					const $dialog = Dialog.create(html`
						<div class="p">
							<select id="dlg-user">
								<option value="">Select a user...</option>
								${available.map(u => html`<option value=${u.id}>${u.name} (${u.email})</option>`)}
							</select>
						</div>
					`, {
						title: 'Add Member',
						confirmText: 'Add',
						confirmAction: async () => {
							const userId = $dialog.querySelector('#dlg-user').value;
							if(!userId) return;
							const [err] = await addMemberToGroup(groupName, userId);
							if(err){ Toast.error(err.msg || 'Failed to add member'); return; }
							Toast.success('Member added');
							loadMembers();
						},
						cancelText: 'Cancel'
					});
				});

				loadMembers();

				/*
					Permissions
				*/

				const $permissionsTable = document.getElementById('permissionsTable');

				if(groupName === 'system:Administrators'){
					document.getElementById('adminPermsMsg').style.display = '';
					$permissionsTable.closest('.card').querySelector('k-table').style.display = 'none';
				} else if(canReadPerms){
					const loadPermissions = async () => {
						const [error, data] = await getGroupPermissions(groupName);
						if(error){
							Toast.error(error.msg || 'Failed to load permissions');
							return;
						}
						$permissionsTable.setData({
							records: data.permissions.map(name => ({ name })),
							fields: [
								{
									name: 'owner',
									label: 'Owner',
									size: 120,
									calculator: r => r.name.includes(':') ? r.name.split(':')[0] : ''
								},
								{
									name: 'resource',
									label: 'Resource',
									size: 180,
									calculator: r => {
										const parts = r.name.split(':');
										return parts.length >= 3 ? parts[1] : parts.length === 2 ? parts[1] : '';
									}
								},
								{
									name: 'action',
									label: 'Action',
									size: 140,
									calculator: r => {
										const parts = r.name.split(':');
										return parts.length >= 3 ? parts.slice(2).join(':') : '';
									}
								}
							]
						});
					};

					loadPermissions();
				} else {
					$permissionsTable.closest('.card').style.display = 'none';
				}
			}
		</script>

</content>
</page>
