<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="48x48" href="/media/icon48.png">
	<link rel="manifest" href="/manifest.json">
	<title>Extensions - Admin</title>
	<link rel="stylesheet" href="/kempo-css/kempo.min.css">
	<script src="/admin/init.js"></script>
	
</head>
<body>
	<!--
	locked: true
-->

	<k-aside
		main="push"
		state="expanded"
		style="--aside_padding: 0;"
		persistent-id="admin-nav"
	>
		<k-aside-toggle>
			<h3 class="m0">Kempo Admin</h3>
		</k-aside-toggle>
		<k-aside-item
			icon="preview"
			href="/"
			no-expand
		>Site</k-aside-item>
		<k-aside-item
			icon="cards"
			href="/admin"
			no-expand
		>Dashboard</k-aside-item>
		<k-aside-menu
			icon="manage-accounts"
			label="Accounts"
		>
			<k-aside-item
				icon="person"
				href="/admin/accounts/users"
				no-expand
			>Users</k-aside-item>
			<k-aside-item
				icon="group"
				href="/admin/accounts/groups"
				no-expand
			>Groups</k-aside-item>
			<k-aside-item
				icon="lock"
				href="/admin/accounts/permissions"
				no-expand
			>Permissions</k-aside-item>
		</k-aside-menu>
		<k-aside-menu
			icon="cards_stack"
			label="Content"
		>
			<k-aside-item
				icon="browse"
				href="/admin/content/templates"
			>Templates</k-aside-item>
			<k-aside-item
				icon="docs"
				href="/admin/content/pages"
			>Pages</k-aside-item>
			<k-aside-item
				icon="content"
				href="/admin/content/fragments"
			>Fragments</k-aside-item>
			<k-aside-item
				icon="globe"
				href="/admin/content/globals"
			>Global Content</k-aside-item>
		</k-aside-menu>
		<k-aside-item
			icon="settings"
			href="/admin/settings"
			no-expand
		>Settings</k-aside-item>
		<k-aside-item
			icon="extension"
			href="/admin/extensions"
			no-expand
		>Extensions</k-aside-item>
		<hr>
		<k-aside-spacer></k-aside-spacer>
		<k-theme-switcher
			labels
			style="--padding:var(--spacer_h);margin:var(--spacer_h) auto"
		></k-theme-switcher>
	</k-aside>
	<script type="module">
		import '/kempo-ui/components/ThemeSwitcher.js';
		const items = document.querySelectorAll('k-aside-item');
		const currentPath = window.location.pathname;

		items.forEach(item => {
			const href = item.getAttribute('href');
			if (!href) return;
			const isExact = href === '/admin' || href === '/';
			const match = isExact
				? (currentPath === href || currentPath === href + '/')
				: (currentPath === href || currentPath.startsWith(href + '/'));
			if (match) {
				item.setAttribute('active', '');
				const menu = item.closest('k-aside-menu');
				if (menu) menu.setAttribute('open', '');
			}
		});
	</script>

	<k-main>
		
<script type="module" src="/kempo-ui/components/Table.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/FirstPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PrevPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/NextPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/LastPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PageSelect.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PageSize.js"></script>
<script type="module" src="/admin/components/tableControls/InstallExtension.js"></script>
<script type="module" src="/admin/components/tableControls/UninstallExtension.js"></script>
<script type="module" src="/kempo/components/Permission.js"></script>

	<div class="d-f mb" style="align-items: center; gap: var(--spacer);">
		<h1 class="flex mb0">Extensions</h1>
	</div>

	<h2>Installed Extensions</h2>
	<k-table id="installedTable" enable-pages page-size="25" placeholder="No extensions are currently installed.">
		<div slot="top" class="d-f full" style="align-items: center;">
			<div>
				<k-permission has="system:extensions:uninstall">
					<admin-uninstall-extension></admin-uninstall-extension>
				</k-permission>
			</div>
		</div>
		<div class="d-f full" style="align-items: center;">
			<div>
				<k-tc-first-page></k-tc-first-page>
				<k-tc-prev-page></k-tc-prev-page>
				<k-tc-next-page></k-tc-next-page>
				<k-tc-last-page></k-tc-last-page>
			</div>
			<div class="flex"></div>
			<div><k-tc-page-select></k-tc-page-select></div>
			<div class="flex"></div>
			<div><k-tc-page-size></k-tc-page-size></div>
		</div>
	</k-table>

	<h2>Available Extensions</h2>
	<k-table id="availableTable" enable-pages page-size="25" placeholder="No extensions are available to install. Install a kempo extension package via npm first.">
		<div slot="top" class="d-f full" style="align-items: center;">
			<div>
				<k-permission has="system:extensions:install">
					<admin-install-extension></admin-install-extension>
				</k-permission>
			</div>
		</div>
		<div class="d-f full" style="align-items: center;">
			<div>
				<k-tc-first-page></k-tc-first-page>
				<k-tc-prev-page></k-tc-prev-page>
				<k-tc-next-page></k-tc-next-page>
				<k-tc-last-page></k-tc-last-page>
			</div>
			<div class="flex"></div>
			<div><k-tc-page-select></k-tc-page-select></div>
			<div class="flex"></div>
			<div><k-tc-page-size></k-tc-page-size></div>
		</div>
	</k-table>


	</k-main>
	
<script type="module">
	import sdk from '/kempo/sdk.js';

	const installedTable = document.getElementById('installedTable');
	const availableTable = document.getElementById('availableTable');

	const [installedErr, installedData] = await sdk.listExtensions();
	if(!installedErr){
		installedTable.setData(installedData.items, {
			columns: [
				{ key: 'name', label: 'Name' },
				{ key: 'version', label: 'Version' },
				{ key: 'description', label: 'Description' },
				{ key: 'enabled', label: 'Enabled' },
			]
		});
	}

	const [availableErr, availableData] = await sdk.listAvailableExtensions();
	if(!availableErr){
		const installedNames = new Set((installedData?.items || []).map(e => e.name));
		const notInstalled = availableData.items.filter(e => !installedNames.has(e.name));
		availableTable.setData(notInstalled, {
			columns: [
				{ key: 'name', label: 'Name' },
				{ key: 'version', label: 'Version' },
				{ key: 'description', label: 'Description' },
			]
		});
	}
</script>

</body>
</html>
