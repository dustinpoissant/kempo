<!--
	locked: true
-->
<fragment>
	<k-aside
		main="push"
		state="expanded"
		style="--aside_padding: 0;"
		persistent-id="admin-nav"
	>
		<k-aside-toggle>
			<h3 class="m0">Kempo Admin</h3>
		</k-aside-toggle>
		<k-aside-item
			icon="preview"
			href="/"
			no-expand
		>Site</k-aside-item>
		<k-aside-item
			icon="cards"
			href="/admin"
			no-expand
		>Dashboard</k-aside-item>
		<k-aside-menu
			icon="cards_stack"
			label="Content"
		>
			<k-aside-item
				icon="browse"
				href="/admin/content/templates"
			>Templates</k-aside-item>
			<k-aside-item
				icon="docs"
				href="/admin/content/pages"
			>Pages</k-aside-item>
			<k-aside-item
				icon="content"
				href="/admin/content/fragments"
			>Fragments</k-aside-item>
			<k-aside-item
				icon="globe"
				href="/admin/content/globals"
			>Global Content</k-aside-item>
		</k-aside-menu>
		<k-aside-menu
			icon="manage-accounts"
			label="Accounts"
		>
			<k-aside-item
				icon="person"
				href="/admin/accounts/users"
				no-expand
			>Users</k-aside-item>
			<k-aside-item
				icon="group"
				href="/admin/accounts/groups"
				no-expand
			>Groups</k-aside-item>
			<k-aside-item
				icon="lock"
				href="/admin/accounts/permissions"
				no-expand
			>Permissions</k-aside-item>
		</k-aside-menu>
		
		<k-aside-item
			icon="settings"
			href="/admin/settings"
			no-expand
		>Settings</k-aside-item>
		<k-aside-item
			icon="extension"
			href="/admin/extensions"
			no-expand
		>Extensions</k-aside-item>
		<hr>
		<k-aside-spacer></k-aside-spacer>
		<k-theme-select></k-theme-select>
	</k-aside>
	<script type="module">
		import '/kempo-ui/components/ThemeSelect.js';
		const items = document.querySelectorAll('k-aside-item');
		const currentPath = window.location.pathname;

		items.forEach(item => {
			const href = item.getAttribute('href');
			if (!href) return;
			const isExact = href === '/admin' || href === '/';
			const match = isExact
				? (currentPath === href || currentPath === href + '/')
				: (currentPath === href || currentPath.startsWith(href + '/'));
			if (match) {
				item.setAttribute('active', '');
				const menu = item.closest('k-aside-menu');
				if (menu) menu.setAttribute('open', '');
			}
		});
	</script>
</fragment>
