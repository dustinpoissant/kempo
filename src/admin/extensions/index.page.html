<page title="Extensions - Admin">
<content>
<script type="module" src="/kempo-ui/components/Table.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/FirstPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PrevPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/NextPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/LastPage.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PageSelect.js"></script>
<script type="module" src="/kempo-ui/components/tableControls/PageSize.js"></script>
<script type="module" src="/admin/components/tableControls/InstallExtension.js"></script>
<script type="module" src="/admin/components/tableControls/UninstallExtension.js"></script>
<script type="module" src="/kempo/components/Permission.js"></script>

	<div class="d-f mb" style="align-items: center; gap: var(--spacer);">
		<h1 class="flex mb0">Extensions</h1>
	</div>

	<h2>Installed Extensions</h2>
	<k-table id="installedTable" enable-pages page-size="25" placeholder="No extensions are currently installed.">
		<div slot="top" class="d-f full" style="align-items: center;">
			<div>
				<k-permission has="system:extensions:uninstall">
					<admin-uninstall-extension></admin-uninstall-extension>
				</k-permission>
			</div>
		</div>
		<div class="d-f full" style="align-items: center;">
			<div>
				<k-tc-first-page></k-tc-first-page>
				<k-tc-prev-page></k-tc-prev-page>
				<k-tc-next-page></k-tc-next-page>
				<k-tc-last-page></k-tc-last-page>
			</div>
			<div class="flex"></div>
			<div><k-tc-page-select></k-tc-page-select></div>
			<div class="flex"></div>
			<div><k-tc-page-size></k-tc-page-size></div>
		</div>
	</k-table>

	<h2>Available Extensions</h2>
	<k-table id="availableTable" enable-pages page-size="25" placeholder="No extensions are available to install. Install a kempo extension package via npm first.">
		<div slot="top" class="d-f full" style="align-items: center;">
			<div>
				<k-permission has="system:extensions:install">
					<admin-install-extension></admin-install-extension>
				</k-permission>
			</div>
		</div>
		<div class="d-f full" style="align-items: center;">
			<div>
				<k-tc-first-page></k-tc-first-page>
				<k-tc-prev-page></k-tc-prev-page>
				<k-tc-next-page></k-tc-next-page>
				<k-tc-last-page></k-tc-last-page>
			</div>
			<div class="flex"></div>
			<div><k-tc-page-select></k-tc-page-select></div>
			<div class="flex"></div>
			<div><k-tc-page-size></k-tc-page-size></div>
		</div>
	</k-table>

</content>
<content location="scripts">
<script type="module">
	import sdk from '/kempo/sdk.js';

	const installedTable = document.getElementById('installedTable');
	const availableTable = document.getElementById('availableTable');

	const [installedErr, installedData] = await sdk.listExtensions();
	if(!installedErr){
		installedTable.setData(installedData.items, {
			columns: [
				{ key: 'name', label: 'Name' },
				{ key: 'version', label: 'Version' },
				{ key: 'description', label: 'Description' },
				{ key: 'enabled', label: 'Enabled' },
			]
		});
	}

	const [availableErr, availableData] = await sdk.listAvailableExtensions();
	if(!availableErr){
		const installedNames = new Set((installedData?.items || []).map(e => e.name));
		const notInstalled = availableData.items.filter(e => !installedNames.has(e.name));
		availableTable.setData(notInstalled, {
			columns: [
				{ key: 'name', label: 'Name' },
				{ key: 'version', label: 'Version' },
				{ key: 'description', label: 'Description' },
			]
		});
	}
</script>
</content>
</page>
