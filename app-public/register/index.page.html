<!--
  owner: system
  title: Register
  description: New user registration page
-->
<page title="Register">
<content>
	<main class="p">
		<div style="max-width: 400px; margin: 0 auto;">
			<h2>Register</h2>
			<form id="registerForm">
				<div class="mb">
					<label for="name" class="d-b mb-sm">Name</label>
					<input type="text" id="name" name="name" required class="w-full p-sm br">
				</div>
				<div class="mb">
					<label for="email" class="d-b mb-sm">Email</label>
					<input type="email" id="email" name="email" required class="w-full p-sm br">
				</div>
				<div class="mb">
					<label for="password" class="d-b mb-sm">Password</label>
					<input type="password" id="password" name="password" required class="w-full p-sm br">
				</div>
				<div id="error" class="mb c-error" style="display: none;"></div>
				<button type="submit" class="w-full p-sm br">Register</button>
			</form>
			<p class="mt">Already have an account? <a href="{{pathToRoot}}login">Login</a></p>
		</div>
	</main>
</content>
<content location="scripts">
	<script type="module">
		import { register } from '{{pathToRoot}}kempo/sdk.js';
		import Toast from '{{pathToRoot}}kempo-ui/components/Toast.js';

		const form = document.getElementById('registerForm');
		const errorDiv = document.getElementById('error');

		form.addEventListener('submit', async (e) => {
			e.preventDefault();
			errorDiv.style.display = 'none';

			const name = document.getElementById('name').value;
			const email = document.getElementById('email').value;
			const password = document.getElementById('password').value;

			const [error, result] = await register({ name, email, password });
			if(error){
				Toast.error(error.msg);
				return;
			}
			if(result.requiresVerification){
				window.location.href = '{{pathToRoot}}verify-email';
			} else {
				window.location.href = '{{pathToRoot}}account';
			}
		});
	</script>
</content>
</page>
