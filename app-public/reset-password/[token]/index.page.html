<!--
  owner: system
  title: Reset Password
  description: Password reset form, accessed via emailed link
-->
<page title="Reset Password">
<content>
	<main class="p">
		<div style="max-width: 400px; margin: 0 auto;">
			<h2>Reset Password</h2>
			<form id="resetForm">
				<input type="hidden" id="token">
				<div class="mb">
					<label for="password" class="d-b mb-sm">New Password</label>
					<input type="password" id="password" name="password" required minlength="8" class="w-full p-sm br">
				</div>
				<div class="mb">
					<label for="confirm-password" class="d-b mb-sm">Confirm Password</label>
					<input type="password" id="confirm-password" name="confirm-password" required minlength="8" class="w-full p-sm br">
				</div>
				<div class="mb">
					<k-toggle id="logout-all">Log out all other devices</k-toggle>
				</div>
				<button type="submit" class="w-full p-sm br">Reset Password</button>
			</form>
			<p class="mt">
				<a href="{{pathToRoot}}login">Back to Login</a>
			</p>
		</div>
	</main>
</content>
<content location="scripts">
	<script src="{{pathToRoot}}kempo-ui/components/Toggle.js" type="module"></script>
	<script type="module">
		import { resetPassword } from '{{pathToRoot}}kempo/sdk.js';
		import Toast from '{{pathToRoot}}kempo-ui/components/Toast.js';

		const tokenInput = document.getElementById('token');
		const pathParts = window.location.pathname.split('/').filter(p => p);
		const token = pathParts[pathParts.length - 1];
		tokenInput.value = token;

		const form = document.getElementById('resetForm');

		form.addEventListener('submit', async (e) => {
			e.preventDefault();

			const password = document.getElementById('password').value;
			const confirmPassword = document.getElementById('confirm-password').value;
			const token = document.getElementById('token').value;
			const logoutAll = document.getElementById('logout-all').value;

			if(password !== confirmPassword){
				Toast.error('Passwords do not match');
				return;
			}

			if(password.length < 8){
				Toast.error('Password must be at least 8 characters');
				return;
			}

			const [error] = await resetPassword({ password, token, logoutAll });
			if(error){
				Toast.error(error.msg);
				return;
			}
			Toast.success('Password reset successful! Redirecting...');
			setTimeout(() => {
				window.location.href = '{{pathToRoot}}account';
			}, 1500);
		});
	</script>
</content>
</page>
