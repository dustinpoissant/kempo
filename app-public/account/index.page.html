<!--
  owner: system
  title: My Account
  description: User account settings and profile management
-->
<page title="My Account">
<content location="head">
	<style>
		input.error {
			--c_input_border: var(--c_danger, red);
			--focus_shadow: 0 0 2px 2px var(--c_danger, red);
		}
	</style>
</content>
<content>
	<main class="p">
		<div style="max-width: 600px; margin: 0 auto;">
			<h2>My Account</h2>
			<div class="mb">
				<strong>Name:</strong> <k-user-name></k-user-name>
			</div>
			<div class="mb">
				<strong>Email:</strong> <k-user-email></k-user-email>
			</div>
			<div class="mb">
				<strong>Email Verified:</strong> <k-user-email-verified></k-user-email-verified>
			</div>
			<div class="mb">
				<strong>Member Since:</strong> <k-user-created-at></k-user-created-at>
			</div>
			<div class="mt-lg">
				<k-permission has="system:admin:access">
					<a href="{{pathToRoot}}admin" class="btn primary">Admin Panel</a>
				</k-permission>
				<button id="changePasswordBtn" class="btn">Change Password</button>
				<k-logout-btn redirect="{{pathToRoot}}login" button-class="btn danger">Logout</k-logout-btn>
			</div>
		</div>
	</main>
	<k-dialog id="changePasswordDialog">
		<h5 slot="title" class="pyh px m0">Change Password</h5>
		<form id="changePasswordForm" class="p">
			<div class="mb">
				<label for="currentPassword" class="d-b mb-sm">Current Password</label>
				<input type="password" id="currentPassword" required class="w-full p-sm br">
			</div>
			<div class="mb">
				<label for="newPassword" class="d-b mb-sm">New Password</label>
				<input type="password" id="newPassword" required minlength="8" class="w-full p-sm br">
			</div>
			<div class="mb">
				<label for="confirmPassword" class="d-b mb-sm">Confirm New Password</label>
				<input type="password" id="confirmPassword" required minlength="8" class="w-full p-sm br">
			</div>
			<k-toggle id="logout-all">Logout all other devices</k-toggle>
			<div class="ta-right">
				<button type="submit" class="primary">Change Password</button>
			</div>
		</form>
	</k-dialog>
</content>
<content location="scripts">
	<script src="{{pathToRoot}}kempo-ui/components/Dialog.js" type="module"></script>
	<script src="{{pathToRoot}}kempo/components/Permission.js" type="module"></script>
	<script src="{{pathToRoot}}kempo/components/UserName.js" type="module"></script>
	<script src="{{pathToRoot}}kempo/components/UserEmail.js" type="module"></script>
	<script src="{{pathToRoot}}kempo/components/UserEmailVerified.js" type="module"></script>
	<script src="{{pathToRoot}}kempo/components/UserCreatedAt.js" type="module"></script>
	<script src="{{pathToRoot}}kempo/components/LogoutBtn.js" type="module"></script>
	<script src="{{pathToRoot}}kempo-ui/components/Toggle.js" type="module"></script>
	<script type="module">
		import { changePassword } from '{{pathToRoot}}kempo/sdk.js';
		import Toast from '{{pathToRoot}}kempo-ui/components/Toast.js';

		(()=>{
			const $dialog = document.getElementById('changePasswordDialog');
			const $confirmPassword = document.getElementById('confirmPassword');
			document.getElementById('changePasswordBtn').addEventListener('click', () => {
				$dialog.open();
			});
			document.getElementById('changePasswordForm').addEventListener('submit', async (event) => {
				event.preventDefault();
				const currentPassword = document.getElementById('currentPassword').value;
				const newPassword = document.getElementById('newPassword').value;
				const confirmPassword = $confirmPassword.value;
				if(newPassword !== confirmPassword){
					$confirmPassword.classList.add('error');
					$confirmPassword.setCustomValidity("Your new password and confirmation password do not match");
					return;
				}
				$dialog.close();
				const [error] = await changePassword({
					currentPassword,
					newPassword,
					logoutAll: document.getElementById('logout-all').value
				});
				if(error){
					Toast.error(error.msg);
					return;
				}
				Toast.success('Password Updated');
			});
			$confirmPassword.addEventListener('input', ()=>{
				$confirmPassword.classList.remove('error');
				$confirmPassword.setCustomValidity('');
			});
		})();
	</script>
</content>
</page>
